services:
  app:
    build: .
    container_name: code-editor-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      EXECUTOR_WORK_DIR: /tmp/codeeditor-exec
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/codeeditor-exec:/tmp/codeeditor-exec
